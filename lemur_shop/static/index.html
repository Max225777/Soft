<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
  <meta http-equiv="Pragma" content="no-cache" />
  <meta http-equiv="Expires" content="0" />
  <title>Лемур</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <style>
    #boot-loader{position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:18px;background:radial-gradient(ellipse at 50% -10%,rgba(46,124,246,.18) 0%,transparent 55%),#030304;color:#fff;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;z-index:9999}
    #boot-loader .lg{font-size:54px;line-height:1}
    #boot-spin{width:44px;height:44px;border-radius:50%;border:4px solid rgba(255,255,255,.12);border-top-color:#2E7CF6;animation:bl-spin 1s linear infinite}
    @keyframes bl-spin{to{transform:rotate(360deg)}}
    #boot-err{display:none;max-width:300px;text-align:center;padding:0 24px}
    #boot-err .t{font-weight:800;font-size:17px;margin-bottom:8px}
    #boot-err .d{font-size:13px;color:#b4b8c4;line-height:1.5;margin-bottom:18px}
    #boot-err button{background:linear-gradient(135deg,#2AABEE,#2E7CF6);color:#fff;border:none;border-radius:999px;padding:12px 24px;font-size:15px;font-weight:700;cursor:pointer}
  </style>
  <script type="module" crossorigin src="/assets/index-BTVMwbOY.js"></script>
  <link rel="stylesheet" crossorigin href="/assets/index-4n3zHn6R.css">
</head>
<body>
  <div id="root">
    <div id="boot-loader">
      <div class="lg">🦎</div>
      <div id="boot-spin"></div>
      <div id="boot-err">
        <div class="t">Не удалось загрузить</div>
        <div class="d">Проверьте интернет-соединение и попробуйте ещё раз. Если не помогает — откройте приложение чуть позже.</div>
        <button onclick="location.reload()">Обновить</button>
      </div>
    </div>
  </div>
  <script>
    // Якщо застосунок не змонтувався за 18с (бандл не докачався / хост недоступний) —
    // показуємо зрозумілу помилку з кнопкою «Обновить» замість білого екрана.
    (function () {
      setTimeout(function () {
        if (document.getElementById('boot-loader')) {
          var sp = document.getElementById('boot-spin'); if (sp) sp.style.display = 'none';
          var e = document.getElementById('boot-err'); if (e) e.style.display = 'block';
        }
      }, 18000);
    })();
  </script>
</body>
</html>
